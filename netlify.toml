[build]
  command = "npm run build:netlify"
  publish = "dist/client"
  functions = "netlify/functions"

[functions]
  # nft traces imports — required for dynamic import("./assets/*") inside server.js
  node_bundler = "nft"
  external_node_modules = []
  included_files = ["node_modules/ai/**", "node_modules/@ai-sdk/**"]

  [functions.server]
    timeout = 60

# All routes handled by the SSR function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

[dev]
  command = "bun run dev"
  port = 3000

[[edge_functions]]
  path = "/*"
  function = "security"
